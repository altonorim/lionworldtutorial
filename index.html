<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Обучение командам сервера</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 2rem 1.5rem;
            min-height: 100vh;
            color: #eef2ff;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 {
            font-size: 2.3rem;
            background: linear-gradient(135deg, #c084fc, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .badge { background: #1e293b; display: inline-block; padding: 0.3rem 1rem; border-radius: 40px; font-size: 0.85rem; }
        .commands-list { display: flex; flex-direction: column; gap: 1rem; margin-top: 1.5rem; }
        .command-card { background: rgba(15, 23, 42, 0.7); border-radius: 1.2rem; padding: 1rem 1.5rem; border: 1px solid #2d3a5e; }
        .command-name { font-family: monospace; background: #00000066; display: inline-block; padding: 0.2rem 0.8rem; border-radius: 30px; font-size: 1.2rem; font-weight: bold; color: #bbf0ff; margin-bottom: 0.5rem; }
        .command-desc { color: #cbd5e6; }
        .admin-panel { margin-top: 2rem; background: rgba(0, 0, 0, 0.5); border-radius: 1.5rem; padding: 1.5rem; border: 1px solid #3b82f6; }
        .admin-panel h3 { margin-bottom: 1rem; color: #60a5fa; }
        input, textarea { width: 100%; background: #0a0f1f; border: 1px solid #334155; border-radius: 1rem; padding: 0.7rem; color: white; margin-bottom: 0.7rem; }
        button { background: #3b82f6; border: none; padding: 0.5rem 1rem; border-radius: 2rem; color: white; cursor: pointer; margin-right: 0.5rem; margin-top: 0.3rem; }
        .btn-danger { background: #ef4444; }
        .btn-success { background: #10b981; }
        .editor-item { background: #111827; margin-bottom: 0.5rem; padding: 0.5rem; border-radius: 0.8rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 5px; }
        .footer { text-align: center; margin-top: 2rem; font-size: 0.7rem; color: #5b6e8c; }
        .status { font-size: 0.8rem; margin-top: 0.8rem; padding: 0.5rem; border-radius: 1rem; text-align: center; }
        .status-ok { background: #10b98133; color: #34d399; }
        .status-error { background: #ef444433; color: #f87171; }
        .loading { text-align: center; padding: 2rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📘 Обучение командам сервера</h1>
        <div class="badge" id="roleBadge">🔐 Режим: просмотр</div>
    </div>

    <div id="commandsContainer" class="commands-list">
        <div class="loading">⏳ Загрузка команд...</div>
    </div>

    <div id="adminPanel" class="admin-panel" style="display: none;">
        <h3>🛠️ Редактор команд</h3>
        <input type="text" id="newCmdName" placeholder="//warp pvp">
        <textarea id="newCmdDesc" rows="2" placeholder="Телепорт на арену PVP"></textarea>
        <button id="addBtn" class="btn-success">➕ Добавить команду</button>
        <div style="margin: 15px 0 10px;">📋 Существующие команды:</div>
        <div id="adminList"></div>
        <div id="saveStatus" class="status"></div>
        <button id="logoutBtn" class="btn-danger">🚪 Выйти</button>
    </div>

    <div style="text-align: center; margin-top: 1.5rem;">
        <button id="enterAdminBtn">🔑 Войти как администратор</button>
    </div>

    <div class="footer">
        💾 Команды общие для всех. Изменения сохраняются автоматически.
    </div>
</div>

<script>
    // ========== ТВОЙ GIST ID ==========
    const GIST_ID = "4ee74e0da38111c49b9e3c82a38810e7";
    // ==================================
    
    let commands = [];
    let isAdmin = false;

    // Загрузка с GitHub Gist
    async function loadFromGist() {
        try {
            const response = await fetch(`https://api.github.com/gists/${GIST_ID}`);
            if (!response.ok) throw new Error("Gist не загрузился");
            const gist = await response.json();
            const content = gist.files["commands.json"]?.content;
            if (content) {
                const data = JSON.parse(content);
                if (data.commands && data.commands.length > 0) {
                    commands = data.commands;
                } else {
                    commands = [];
                }
            } else {
                commands = [];
            }
        } catch(e) {
            showStatus("❌ Ошибка загрузки", "error");
            commands = [];
        }
        render();
    }

    // Сохранение на GitHub Gist
    async function saveToGist() {
        try {
            // Получаем текущий gist
            const getResponse = await fetch(`https://api.github.com/gists/${GIST_ID}`);
            const gist = await getResponse.json();
            
            const content = JSON.stringify({ commands }, null, 2);
            const updateResponse = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    files: {
                        "commands.json": { content: content }
                    }
                })
            });
            if (!updateResponse.ok) throw new Error("Ошибка сохранения");
            if (isAdmin) showStatus("✅ Сохранено! Через 1 минуту обновится у всех", "ok");
        } catch(e) {
            if (isAdmin) showStatus("❌ Ошибка сохранения", "error");
        }
    }

    async function saveAndSync() {
        await saveToGist();
        render();
        if (isAdmin) renderAdmin();
    }

    function showStatus(msg, type) {
        const el = document.getElementById("saveStatus");
        if (!el) return;
        el.innerHTML = msg;
        el.className = `status status-${type}`;
        setTimeout(() => el.innerHTML = "", 3000);
    }

    function render() {
        const container = document.getElementById("commandsContainer");
        if (!commands.length) {
            container.innerHTML = '<div class="loading">📭 Команды пока не добавлены</div>';
            return;
        }
        container.innerHTML = commands.map(c => `
            <div class="command-card">
                <div class="command-name">${escape(c.name)}</div>
                <div class="command-desc">${escape(c.description)}</div>
            </div>
        `).join("");
        if (isAdmin) renderAdmin();
    }

    function renderAdmin() {
        const container = document.getElementById("adminList");
        if (!commands.length) {
            container.innerHTML = "<div>Нет команд. Добавьте первую!</div>";
            return;
        }
        container.innerHTML = commands.map(c => `
            <div class="editor-item">
                <div><strong>${escape(c.name)}</strong><br><small>${escape(c.description)}</small></div>
                <div>
                    <button onclick="edit('${c.id}')">✏️</button>
                    <button onclick="del('${c.id}')" class="btn-danger">🗑️</button>
                </div>
            </div>
        `).join("");
    }

    window.edit = async (id) => {
        const cmd = commands.find(c => c.id === id);
        if (!cmd) return;
        const newName = prompt("Название команды:", cmd.name);
        if (newName?.trim()) cmd.name = newName.trim();
        const newDesc = prompt("Описание:", cmd.description);
        if (newDesc !== null) cmd.description = newDesc.trim() || "—";
        await saveAndSync();
    };

    window.del = async (id) => {
        if (!confirm("Удалить команду?")) return;
        commands = commands.filter(c => c.id !== id);
        await saveAndSync();
    };

    async function add() {
        const name = document.getElementById("newCmdName").value.trim();
        const desc = document.getElementById("newCmdDesc").value.trim();
        if (!name) return alert("Введите команду");
        commands.push({
            id: Date.now() + "_" + Math.random(),
            name: name,
            description: desc || "Нет описания"
        });
        await saveAndSync();
        document.getElementById("newCmdName").value = "";
        document.getElementById("newCmdDesc").value = "";
        alert("✅ Команда добавлена и сохранена!");
    }

    function enterAdmin() {
        const pwd = prompt("Пароль администратора:");
        if (pwd === "admin2025") {
            isAdmin = true;
            document.getElementById("adminPanel").style.display = "block";
            document.getElementById("enterAdminBtn").style.display = "none";
            document.getElementById("roleBadge").innerHTML = "👑 Администратор";
            renderAdmin();
        } else if (pwd) alert("Неверный пароль");
    }

    function logout() {
        isAdmin = false;
        document.getElementById("adminPanel").style.display = "none";
        document.getElementById("enterAdminBtn").style.display = "inline-block";
        document.getElementById("roleBadge").innerHTML = "🔐 Режим: просмотр";
    }

    function escape(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, m => m === "&" ? "&amp;" : m === "<" ? "&lt;" : "&gt;");
    }

    document.addEventListener("DOMContentLoaded", () => {
        loadFromGist();
        document.getElementById("enterAdminBtn").onclick = enterAdmin;
        document.getElementById("logoutBtn").onclick = logout;
        document.getElementById("addBtn").onclick = add;
    });
</script>
</body>
</html>
