<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    title>Обучение командам сервера</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 2rem 1.5rem;
            min-height: 100vh;
            color: #eef2ff;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 {
            font-size: 2.3rem;
            background: linear-gradient(135deg, #c084fc, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .badge { background: #1e293b; display: inline-block; padding: 0.3rem 1rem; border-radius: 40px; font-size: 0.85rem; }
        .commands-list { display: flex; flex-direction: column; gap: 1rem; margin-top: 1.5rem; }
        .command-card { background: rgba(15, 23, 42, 0.7); border-radius: 1.2rem; padding: 1rem 1.5rem; border: 1px solid #2d3a5e; }
        .command-name { font-family: monospace; background: #00000066; display: inline-block; padding: 0.2rem 0.8rem; border-radius: 30px; font-size: 1.2rem; font-weight: bold; color: #bbf0ff; margin-bottom: 0.5rem; }
        .command-desc { color: #cbd5e6; }
        .admin-panel { margin-top: 2rem; background: rgba(0, 0, 0, 0.5); border-radius: 1.5rem; padding: 1.5rem; border: 1px solid #3b82f6; }
        input, textarea { width: 100%; background: #0a0f1f; border: 1px solid #334155; border-radius: 1rem; padding: 0.7rem; color: white; margin-bottom: 0.7rem; }
        button { background: #3b82f6; border: none; padding: 0.5rem 1rem; border-radius: 2rem; color: white; cursor: pointer; }
        .btn-danger { background: #ef4444; }
        .editor-item { background: #111827; margin-bottom: 0.5rem; padding: 0.5rem; border-radius: 0.8rem; display: flex; justify-content: space-between; align-items: center; }
        .footer { text-align: center; margin-top: 2rem; font-size: 0.7rem; color: #5b6e8c; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📘 Обучение командам сервера</h1>
        <div class="badge" id="roleBadge">🔐 Режим: просмотр</div>
    </div>

    <div id="commandsContainer" class="commands-list">⏳ Загрузка команд с GitHub...</div>

    <div id="adminPanel" class="admin-panel" style="display: none;">
        <h3>🛠️ Редактор команд</h3>
        <input type="text" id="newCmdName" placeholder="/sell hand">
        <textarea id="newCmdDesc" rows="2" placeholder="Продать предмет из руки"></textarea>
        <button id="addBtn">➕ Добавить команду</button>
        <div style="margin: 15px 0 10px;">📋 Существующие команды:</div>
        <div id="adminList"></div>
        <button id="logoutBtn" class="btn-danger">🚪 Выйти из админ-режима</button>
    </div>

    <div style="text-align: center; margin-top: 1.5rem;">
        <button id="enterAdminBtn">🔑 Войти как администратор</button>
    </div>

    <div class="footer">
        ⚡ Команды загружаются с GitHub. Изменения видны всем игрокам сразу.
    </div>
</div>

<script>
    // GitHub репозиторий
    const REPO_OWNER = "altonorim";
    const REPO_NAME = "lionworldtutorial";
    const FILE_PATH = "commands.json";
    const GITHUB_RAW_URL = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/${FILE_PATH}`;

    let commandsDatabase = [];
    let isAdminMode = false;

    // Загрузка с GitHub
    async function loadCommands() {
        try {
            const response = await fetch(GITHUB_RAW_URL + "?t=" + Date.now());
            if (response.ok) {
                const data = await response.json();
                if (data.commands && Array.isArray(data.commands)) {
                    commandsDatabase = data.commands;
                } else {
                    commandsDatabase = [];
                }
            } else {
                commandsDatabase = [];
            }
        } catch (e) {
            console.error("Ошибка загрузки:", e);
            commandsDatabase = [];
        }
        renderPlayerView();
        if (isAdminMode) renderAdminList();
    }

    function renderPlayerView() {
        const container = document.getElementById('commandsContainer');
        if (!commandsDatabase.length) {
            container.innerHTML = '<div style="padding:2rem; text-align:center;">📭 Команды пока не добавлены. Администратор может отредактировать commands.json на GitHub.</div>';
            return;
        }
        let html = '';
        for (let cmd of commandsDatabase) {
            html += `
                <div class="command-card">
                    <div class="command-name">${escapeHtml(cmd.name)}</div>
                    <div class="command-desc">${escapeHtml(cmd.description)}</div>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    function renderAdminList() {
        const container = document.getElementById('adminList');
        if (!commandsDatabase.length) {
            container.innerHTML = '<div>Нет команд. Добавьте первую!</div>';
            return;
        }
        let html = '';
        for (let cmd of commandsDatabase) {
            html += `
                <div class="editor-item">
                    <div><strong>${escapeHtml(cmd.name)}</strong><br><small>${escapeHtml(cmd.description)}</small></div>
                    <div>
                        <button onclick="alert('Редактирование доступно только в файле commands.json на GitHub')">✏️</button>
                        <button onclick="alert('Удаление доступно только в файле commands.json на GitHub')" class="btn-danger">🗑️</button>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    function addCommand() {
        alert("✏️ Чтобы добавить команду, отредактируй файл commands.json на GitHub:\n\nhttps://github.com/altonorim/lionworldtutorial/blob/main/commands.json\n\nПросто добавь новую строчку в список и нажми Commit changes.");
    }

    function enterAdmin() {
        const pwd = prompt('Пароль администратора:');
        if (pwd === 'admin2025') {
            isAdminMode = true;
            document.getElementById('adminPanel').style.display = 'block';
            document.getElementById('enterAdminBtn').style.display = 'none';
            document.getElementById('roleBadge').innerHTML = '👑 Режим: администратор';
            renderAdminList();
        } else if (pwd !== null) {
            alert('Неверный пароль');
        }
    }

    function logoutAdmin() {
        isAdminMode = false;
        document.getElementById('adminPanel').style.display = 'none';
        document.getElementById('enterAdminBtn').style.display = 'inline-block';
        document.getElementById('roleBadge').innerHTML = '🔐 Режим: просмотр';
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadCommands();
        document.getElementById('enterAdminBtn').onclick = enterAdmin;
        document.getElementById('logoutBtn').onclick = logoutAdmin;
        document.getElementById('addBtn').onclick = addCommand;
    });
</script>
</body>
</html>
